<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/sirius-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sirius - Student productivity app for course management, scheduling, tasks, pomodoro timer, and study rewards" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Sirius - Student Productivity</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function showBootFailure(error) {
          var message = error && error.message ? error.message : String(error || 'Unknown startup error');
          var stack = error && error.stack ? error.stack : '';
          var target = document.getElementById('root') || document.body;

          if (!target) {
            return;
          }

          target.innerHTML = `
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070b16;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;">
              <div style="width:min(680px,100%);border:1px solid rgba(248,250,252,.18);border-radius:28px;background:rgba(15,23,42,.92);box-shadow:0 24px 70px rgba(0,0,0,.38);padding:28px;">
                <p style="margin:0 0 10px;color:#fbbf24;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:12px;">Sirius startup error</p>
                <h1 style="margin:0 0 14px;font-size:28px;line-height:1.15;">The app could not start.</h1>
                <p style="margin:0 0 18px;color:#cbd5e1;line-height:1.55;">Send this exact message back so we can fix the native startup issue quickly.</p>
                <pre style="white-space:pre-wrap;overflow:auto;max-height:280px;background:#020617;border:1px solid rgba(148,163,184,.2);border-radius:18px;padding:16px;color:#fecaca;font-size:13px;line-height:1.5;">${message}${stack ? `\n\n${stack}` : ''}</pre>
              </div>
            </div>
          `;
        }

        window.__SIRIUS_BOOT_FAIL__ = showBootFailure;
        window.addEventListener('error', function (event) {
          if (event && event.error) {
            showBootFailure(event.error);
          }
        });
        window.addEventListener('unhandledrejection', function (event) {
          if (event && event.reason) {
            showBootFailure(event.reason);
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
